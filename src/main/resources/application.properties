spring.application.name=fleet-service
server.port=8764

# POSTGRES SQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wtms_fleet_db}  
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:your_strong_password}

# JPA HIBERNATE SETTING
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

# EUREKA DISCOVERY CLIENT
eureka.instance.prefer-ip-address=true
eureka.client.fetch-register=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# KAFKA
kafka.bootstrap.server=${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
kafka.consumer.group=${KAFKA_CONSUMER_GROUP:fleet-group}

